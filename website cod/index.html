<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>ElectroCalc – Proiect Electric</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: auto;
            background: #f5f5f5;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #2a4d69;
        }
        .card {
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
        button {
            background: #2a4d69;
            padding: 12px;
            border: none;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 16px;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #1d3347;
        }
        .response-box {
            white-space: pre-wrap;
            background: #eef;
            padding: 15px;
            margin-top: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h1>ElectroCalc – Generare Proiect Electric</h1>

<div class="card">
    <h2>Date proiect</h2>

    <label>ID Proiect</label>
    <input id="project_id" placeholder="ex: PROIECT_BRUSTURI_2025">

    <label>Localitate</label>
    <input id="locality" placeholder="ex: Brusturi">

    <label>Tip clădire</label>
    <input id="type" placeholder="Casa unifamiliala">

    <label>Regim înălțime</label>
    <input id="levels" placeholder="ex: P+M">

    <label>Suprafață utilă totală (m²)</label>
    <input id="floor_area" type="number">

    <label>Volum clădire (m³)</label>
    <input id="volume" type="number">

    <label>Izolație</label>
    <select id="insulation">
        <option value="minim_normativ">Minim normativ</option>
        <option value="peste_normativ">Peste normativ</option>
        <option value="sub_normativ">Sub normativ</option>
    </select>
</div>

<div class="card">
    <h2>Sistem încălzire</h2>

    <label>Tip încălzire</label>
    <select id="heating_type">
        <option value="PDC aer-apa">PDC aer-apa</option>
        <option value="PDC aer-aer">PDC aer-aer</option>
        <option value="centrala_gaz">Centrala gaz</option>
        <option value="centrala_electrica">Centrala electrica</option>
        <option value="geotermala">Geotermala</option>
    </select>

    <label>ACM</label>
    <select id="acm">
        <option value="boiler_electric">Boiler electric</option>
        <option value="instant">Instant</option>
        <option value="">Fără</option>
    </select>

    <label>PDC – alimentare</label>
    <select id="pdc_phase">
        <option value="trifazat">Trifazat</option>
        <option value="monofazat">Monofazat</option>
    </select>

    <label>Încalzire în pardoseală?</label>
    <select id="has_floor_heating">
        <option value="false">Nu</option>
        <option value="true">Da</option>
    </select>

</div>

<div class="card">
    <h2>Camere</h2>

    <label>Introduce camerele sub formă JSON</label>
    <textarea id="rooms" rows="6" placeholder='[ {"name": "Living", "area": 30, "height": 2.7, "function": "zi", "has_tv": true, "tv_mount": "suspendat", "has_nightstands": false, "is_bathroom": false} ]'></textarea>
</div>

<button onclick="sendData()">Trimite către ElectroCalc</button>

<div id="response" class="response-box"></div>

<script>
async function sendData() {
    const data = {
        project_id: project_id.value,
        building: {
            type: type.value,
            levels: levels.value,
            floor_area: Number(floor_area.value),
            volume: Number(volume.value),
            insulation: insulation.value,
            locality: locality.value,
            climate_zone: null
        },
        heating: {
            type: heating_type.value,
            acm: acm.value,
            pdc_phase: pdc_phase.value,
            has_ventilation: false,
            has_hrv: false
        },
        rooms: JSON.parse(rooms.value),
        has_floor_heating: (has_floor_heating.value === "true")
    };

    const webhookUrl = "https://adibby.app.n8n.cloud/webhook-test/electro-calc";

    const res = await fetch(webhookUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });

    const text = await res.text();
let data;

try {
  const parsed = JSON.parse(text);
  data = Array.isArray(parsed) ? parsed[0] : parsed;
} catch (e) {
  response.innerText = "Eroare la parsarea răspunsului:\n" + text;
  return;
}

// Afișăm doar memoriul tehnic deocamdată
response.innerText = data.memoriu_tehnic;

}
</script>

</body>
</html>
